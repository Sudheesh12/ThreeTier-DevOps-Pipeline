name: "Ansible Workflow"

on:
  workflow_run:
    workflows: ["Terraform apply on merge"]
    types:
      - completed

jobs:
  ansible:
    name : 'ansible'
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: get the public ip address of the ec2 machine
      run: |
        PUBLIC_IP=$(terraform output -raw public_ip)
        echo "" 

    - name: Setup AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Get SSH key
      run: |
        aws secretsmanager get-secret-value \
        --secret-id ssh-keys/pipeline-ec2-2 \
        --query SecretString --output text | \
        jq -r '.private_key' > key.pem
        chmod 400 key.pem
      
    - name: ssh into the machine
      uses: appleboy/ssh-action@v1
      with:
        host: PUBLIC_IP
        username: ${{ secrets.USERNAME }}
        key: ./key.pem
        port: 22
        script: |
          echo "connected successfully Sudheesh"





    
  

    

