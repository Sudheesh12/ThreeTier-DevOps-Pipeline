apiVersion: apps/v1

kind: Deployment

metadata:
  name: redis
  namespace: 3-tier-app
  labels:
    name: redis
    project: 3-tier-app
    env: test

spec:
  selector:
    matchLabels:
      name: redis

  template:
    metadata:
      labels:
        name: redis
    spec:
      containers:
      - name: redis-backend
        image: redis:7
        ports:
        - containerPort: 6379

---

apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: 3-tier-app
spec:
  selector:
    name: redis
  ports:
  - port: 6379
    targetPort: 6379