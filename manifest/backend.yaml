apiVersion: apps/v1

kind: Deployment

metadata:
  name: backend
  labels:
    name: backend
    project: 3-tier-app
    env: test

spec:
  replicas: 1
  selector:
    matchlabels:
      name: backend

  template:
    metadata:
      labels:
        name: backend
    spec:
      containers:
      - name: node-backend
        image: sudheesh12/backend
        ports:
          containerPort: 3000

---

apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    name: backend
  ports:
    --port: 3000