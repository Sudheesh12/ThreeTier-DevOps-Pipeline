apiVersion: apps/v1

kind: Deployment

metadata:
  name: frontend
  labels:
    name: frontend
    project: 3-tier-app
    env: test

spec:
  replicas: 1
  selector:
    matchlabels:
      name: frontend

  template:
    metadata:
      labels:
        name: frontend
    spec:
      containers:
      - name: nginx-frontend
        image: sudheesh12/frontend
        ports:
          containerPort: 80


---

apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  selector:
    name: frontend
  ports:
  - port: 80
    nodeport: 30000